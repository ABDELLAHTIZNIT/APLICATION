<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion des utilisateurs</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

  body{
    background:#eaeaea;
    display:flex;
    justify-content:center;
    padding:20px;
  }

  .container{
    width:100%;
    max-width:520px;
    background:white;
    padding:18px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
  }

  .header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
  }

  .title{
    font-size:22px;
    font-weight:bold;
    color:#004a62;
  }

  /* User Line */
  .user-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 6px;
    border-bottom:1px solid #ddd;
    font-size:14px;
  }

  .user-info{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .user-icon{
    font-size:18px;
    color:#0074ad;
  }

  .details{
    display:flex;
    flex-direction:column;
    line-height:1.2;
  }

  .user-name{
    font-weight:bold;
    color:#004458;
  }

  .small-info{
    font-size:11px;
    color:#555;
  }

  /* Actions Icons */
  .actions i{
    cursor:pointer;
    font-size:16px;
    margin-left:10px;
  }

  .edit{color:#0074ad;}
  .delete{color:#d9534f;}
  .logout{color:#e67e22;}

  /* Add Button */
  .add-btn{
    width:100%;
    background:#22c55e;
    color:white;
    padding:10px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:15px;
    transition:.2s;
  }
  .add-btn:hover{
    background:#16a34a;
  }
</style>

</head>

<body>

<div class="container">

  <div class="header">
    <div class="title">Utilisateurs</div>
  </div>

  <!-- Add Button -->
  <button class="add-btn" onclick="addUser()">+ Ajouter utilisateur</button>

  <!-- User Row Template -->
  <div class="user-row">
    <div class="user-info">
      <i class="fas fa-user user-icon"></i>

      <div class="details">
        <span class="user-name">Admin</span>
        <span class="small-info">Ferme: - | Profil: Administrateur</span>
        <span class="small-info">Mot de passe: ••••••</span>
      </div>
    </div>

    <div class="actions">
      <i class="fas fa-pen edit"></i>
      <i class="fas fa-trash delete"></i>
      <i class="fas fa-power-off logout" onclick="logoutUser('Admin')" title="Déconnexion forcée"></i>
    
    </div>
  </div>

  <div class="user-row">
    <div class="user-info">
      <i class="fas fa-user user-icon"></i>

      <div class="details">
        <span class="user-name">Ahmed</span>
        <span class="small-info">Ferme: 1 | Profil: Control</span>
        <span class="small-info">Mot de passe: ••••</span>
      </div>
    </div>

    <div class="actions">
      <i class="fas fa-pen edit"></i>
      <i class="fas fa-trash delete"></i>
      <i class="fas fa-power-off logout" onclick="logoutUser('Ahmed')" title="Déconnexion forcée"></i>

    </div>
  </div>

</div>

<script>
function addUser(){
    window.location.href = "add_user.html";
}

function logoutUser(username){
  alert("Déconnexion de: " + username);
}
</script>

</body>
</html>
