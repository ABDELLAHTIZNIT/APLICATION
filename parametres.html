<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paramètres</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:520px;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

/* LOGO */
.logo-app{
  width:90px;
  cursor:pointer;
  background:transparent;
}

.logo-app img{
  width:100%;
  height:auto;
  object-fit:contain;
}

/* USER */
.user-info{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:bold;
}

.user-avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  background:#0ea5e9;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* TITLE */
.title{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-bottom:20px;
  color:#004a62;
}

/* CARDS */
.card{
  width:100%;
  padding:16px;
  background:#f9fafb;
  border:2px solid #d1d5db;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  background:#e0f2fe;
  border-color:#0ea5e9;
}

.card-content{
  display:flex;
  align-items:center;
  gap:12px;
}

.card i{
  font-size:20px;
  color:#0ea5e9;
}

.arrow{
  font-size:18px;
  color:#0ea5e9;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <!-- LOGO قابل للتغيير -->
    <div class="logo-app" onclick="chooseLogo()">
      <img id="appLogo" src="" alt="Logo">
    </div>

    <div class="user-info">
      <span>Admin</span>
      <div class="user-avatar">A</div>
    </div>
  </div>

  <!-- input مخفي لاختيار الصورة -->
  <input type="file" id="logoInput" accept="image/*" style="display:none">

  <div class="title">Paramètres</div>

  <!-- CARDS -->
  <div class="card" onclick="openPage('utilisateurs.html')">
    <div class="card-content">
      <i class="fas fa-users-cog"></i>
      <span>Gestion des utilisateurs</span>
    </div>
    <i class="fas fa-chevron-right arrow"></i>
  </div>

  <div class="card" onclick="openPage('admin_password.html')">
    <div class="card-content">
      <i class="fas fa-key"></i>
      <span>Mot de passe</span>
    </div>
    <i class="fas fa-chevron-right arrow"></i>
  </div>

  <div class="card" onclick="openPage('parametres_structures.html')">
    <div class="card-content">
      <i class="fas fa-sitemap"></i>
      <span>Paramètres des structures</span>
    </div>
    <i class="fas fa-chevron-right arrow"></i>
  </div>

  <div class="card" onclick="openPage('securite.html')">
    <div class="card-content">
      <i class="fas fa-shield-alt"></i>
      <span>Sécurité accès</span>
    </div>
    <i class="fas fa-chevron-right arrow"></i>
  </div>

</div>

<!-- SCRIPT -->
<script>
function openPage(page){
  window.location.href = page;
}

/* اختيار الشعار */
function chooseLogo(){
  document.getElementById("logoInput").click();
}

/* تحميل وحفظ الشعار */
document.getElementById("logoInput").addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    localStorage.setItem("app_logo", e.target.result);
    document.getElementById("appLogo").src = e.target.result;
  };
  reader.readAsDataURL(file);
});

/* عرض الشعار المحفوظ */
window.addEventListener("load", function(){
  const savedLogo = localStorage.getItem("app_logo");
  if(savedLogo){
    document.getElementById("appLogo").src = savedLogo;
  }
});
function openPage(page){
  window.location.href = page;
}

/* اختيار الشعار */
function chooseLogo(){
  document.getElementById("logoInput").click();
}

/* تحميل وحفظ الشعار */
document.getElementById("logoInput").addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    localStorage.setItem("app_logo", e.target.result);
    document.getElementById("appLogo").src = e.target.result;
  };
  reader.readAsDataURL(file);
});

/* عرض الشعار المحفوظ عند فتح الصفحة */
window.addEventListener("load", function(){
  const savedLogo = localStorage.getItem("app_logo");
  if(savedLogo){
    document.getElementById("appLogo").src = savedLogo;
  }
});
</script>



</body>
</html>
