<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion des Fermes</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
  background:#f1f5f9;
  padding:20px;
}

/* ===== CONTAINER ===== */
.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}
.header h2{color:#004a62;}

/* ADD ICON BUTTON */
.add-icon{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#22c55e;
  color:white;
  font-size:24px;
  font-weight:bold;
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.add-icon:hover{background:#16a34a;}

/* ===== TABLE ===== */
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td{
  border:1px solid #e2e8f0;
  padding:8px;
  text-align:center;
}
th{
  background:#e0f2fe;
}

.actions button{
  border:none;
  background:transparent;
  font-size:16px;
  cursor:pointer;
  margin:0 4px;
}
.actions .edit{color:#0284c7;}
.actions .delete{color:#dc2626;}

/* ===== MODAL ===== */
.modal-bg{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.modal{
  background:white;
  width:90%;
  max-width:600px;
  padding:20px;
  border-radius:14px;
  animation:pop .2s ease;
}
@keyframes pop{
  from{transform:scale(.9);opacity:0}
  to{transform:scale(1);opacity:1}
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.modal-header h3{color:#0f172a;}

.modal-actions button{
  width:34px;
  height:34px;
  border-radius:50%;
  border:none;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  margin-left:6px;
}
.btn-save{background:#0ea5e9;color:white;}
.btn-close{background:#ef4444;color:white;}

/* ===== FORM ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:10px;
}

input,select{
  width:100%;
  padding:9px;
  border-radius:8px;
  border:1px solid #cbd5e1;
}

.select-group{
  display:flex;
  align-items:center;
  gap:8px;
  border:1px solid #cbd5e1;
  border-radius:8px;
  padding:6px 8px;
}
.select-group span{
  font-size:14px;
  font-weight:600;
  white-space:nowrap;
}
.select-group select{
  border:none;
  outline:none;
  flex:1;
  background:transparent;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>Gestion des Fermes</h2>
    <button class="add-icon" onclick="openModal()">+</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Nom</th>
        <th>Superficie</th>
        <th>Société</th>
        <th>Région</th>
        <th>Technicien</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableFermes"></tbody>
  </table>

</div>

<!-- ===== MODAL ===== -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Ajouter une ferme</h3>
      <div class="modal-actions">
        <button class="btn-save" onclick="saveFerme()">✓</button>
        <button class="btn-close" onclick="closeModal()">×</button>
      </div>
    </div>

    <div class="grid">
      <input id="nom" placeholder="Nom de la ferme">
      <input id="superficie" placeholder="Superficie (ha)">

      <div class="select-group">
        <span>🏢 Société</span>
        <select id="societe"></select>
      </div>

      <div class="select-group">
        <span>🗺 Région</span>
        <select id="region"></select>
      </div>

      <div class="select-group">
        <span>🧑‍🔧 Technicien</span>
        <select id="technicien"></select>
      </div>
    </div>
  </div>
</div>

<script>
let editIndex=null;

function fillSelect(id,key){
  let s=document.getElementById(id);
  s.innerHTML='<option value="">Sélectionner</option>';
  (JSON.parse(localStorage.getItem(key))||[]).forEach(v=>{
    let o=document.createElement("option");
    o.value=v.nom||v;
    o.textContent=v.nom||v;
    s.appendChild(o);
  });
}

function openModal(){
  modalBg.style.display="flex";
  modalTitle.innerText="Ajouter une ferme";
  clearForm();
  editIndex=null;
}
function closeModal(){
  modalBg.style.display="none";
}

function clearForm(){
  nom.value="";
  superficie.value="";
  societe.value="";
  region.value="";
  technicien.value="";
}

function saveFerme(){
  let f={
    nom:nom.value,
    superficie:superficie.value,
    societe:societe.value,
    region:region.value,
    technicien:technicien.value
  };
  let fermes=JSON.parse(localStorage.getItem("fermes"))||[];
  editIndex!==null ? fermes[editIndex]=f : fermes.push(f);
  localStorage.setItem("fermes",JSON.stringify(fermes));
  location.reload();
}

function loadFermes(){
  let t=document.getElementById("tableFermes");
  (JSON.parse(localStorage.getItem("fermes"))||[]).forEach((f,i)=>{
    let r=document.createElement("tr");
    r.innerHTML=`
      <td>${f.nom}</td>
      <td>${f.superficie}</td>
      <td>${f.societe}</td>
      <td>${f.region}</td>
      <td>${f.technicien}</td>
      <td class="actions">
        <button class="edit" onclick="editFerme(${i})">✏️</button>
        <button class="delete" onclick="deleteFerme(${i})">🗑</button>
      </td>`;
    t.appendChild(r);
  });
}

function editFerme(i){
  let f=JSON.parse(localStorage.getItem("fermes"))[i];
  nom.value=f.nom;
  superficie.value=f.superficie;
  societe.value=f.societe;
  region.value=f.region;
  technicien.value=f.technicien;
  editIndex=i;
  modalTitle.innerText="Modifier la ferme";
  openModal();
}

function deleteFerme(i){
  if(!confirm("Supprimer cette ferme ?"))return;
  let f=JSON.parse(localStorage.getItem("fermes"));
  f.splice(i,1);
  localStorage.setItem("fermes",JSON.stringify(f));
  location.reload();
}

window.onload=()=>{
  fillSelect("societe","societes");
  fillSelect("region","regions");
  fillSelect("technicien","techniciens");
  loadFermes();
};
</script>

</body>
</html>
