<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Eau</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:Arial, sans-serif;}

  body{
    min-height:100vh;
    background:linear-gradient(135deg,#e6f7ff,#bde9ff);
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:20px;
  }

  .container{
    width:100%;
    max-width:500px;
  }

  /* HEADER */
  .header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
  }

 .logo-app{
  width:90px;
  background:transparent;
}

.logo-app img{
  width:100%;
  height:auto;
  object-fit:contain;
}


  .user-info{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:15px;
    font-weight:bold;
  }

  .user-avatar{
    width:30px;
    height:30px;
    background:#22c55e;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:12px;
    color:#022c22;
  }

  /* FORM */
  .title{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#004a62;
    margin-bottom:20px;
  }

  .dropdown{
    background:#ffffffc9;
    border:2px solid #59c4e6;
    border-radius:10px;
    padding:12px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:10px;
  }

  .dropdown i{color:#007ea7;font-size:18px;}

  select{
    width:100%;
    border:none;
    background:transparent;
    font-size:15px;
    font-weight:bold;
    outline:none;
    color:#004458;
    cursor:pointer;
  }

  /* Entrée / Sortie */
  .es-box{
    background:#ffffffc9;
    border:2px solid #59c4e6;
    padding:12px;
    border-radius:10px;
    margin:14px 0;
    display:flex;
    justify-content:space-around;
  }
  label{font-size:15px;font-weight:bold;color:#004458;}

  /* Inputs Compteur */
  .input-box{
    background:#ffffffc9;
    border:2px solid #59c4e6;
    border-radius:10px;
    padding:12px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:10px;
  }

  input[type="number"]{
    width:100%;
    border:none;
    font-size:15px;
    font-weight:bold;
    background:transparent;
    color:#003b50;
    outline:none;
  }

  .unit{font-weight:bold;color:#003b50;}

  /* Résultat */
  .result{
    background:#007ea7;
    color:white;
    text-align:center;
    padding:12px;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    margin-top:12px;
  }

  /* Button */
  .btn{
    width:100%;
    padding:14px;
    background:#008ecc;
    border:none;
    border-radius:12px;
    font-size:17px;
    font-weight:bold;
    color:white;
    margin-top:18px;
    cursor:pointer;
    transition:.2s;
  }
  .btn:hover{
    background:#0074ad;
  }

</style>
</head>

<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo-app">
  <img id="appLogo" src="" alt="Logo">
</div>

    <div class="user-info">
      <span>Admin</span>
      <div class="user-avatar">A</div>
    </div>
  </div>

  <div class="title">Suivi Eau</div>

  <!-- Ferme -->
  <div class="dropdown">
    <i class="fas fa-warehouse"></i>
    <select id="ferme">
      <option disabled selected>Ferme</option>
      <option>Ferme 1</option>
      <option>Ferme 2</option>
    </select>
  </div>

  <!-- Type compteur (الصحيح فوق) -->
  <div class="dropdown">
    <i class="fas fa-water"></i>
    <select id="typeCompteur">
      <option disabled selected>Type compteur</option>
      <option>Station</option>
      <option>Puits</option>
      <option>Réseau</option>
    </select>
  </div>

  <!-- N° Compteur (الصحيح تحت) -->
  <div class="dropdown">
    <i class="fas fa-hashtag"></i>
    <select id="numCompteur">
      <option disabled selected>N° Compteur</option>
      <option>C-01</option>
      <option>C-02</option>
    </select>
  </div>

  <!-- Entrée / Sortie -->
  <div class="es-box">
    <label><input type="radio" name="es" value="Entree"> Entrée ✓</label>
    <label><input type="radio" name="es" value="Sortie"> Sortie ✓</label>
  </div>

  <!-- Début compteur -->
  <div class="input-box">
    <input type="number" id="debut" placeholder="Début compteur">
    <span class="unit">m³</span>
  </div>

  <!-- Fin compteur -->
  <div class="input-box">
    <input type="number" id="fin" placeholder="Fin compteur">
    <span class="unit">m³</span>
  </div>

  <!-- Résultat -->
  <div class="result" id="resultat">Résultat (m³): 0</div>

  <!-- Button -->
  <button class="btn" onclick="calc()">Entrer</button>

</div>

<script>
function calc(){
  let d = parseFloat(document.getElementById("debut").value) || 0;
  let f = parseFloat(document.getElementById("fin").value) || 0;
  let res = f - d;
  document.getElementById("resultat").innerText = "Résultat (m³): " + res;
}
window.addEventListener("load", function(){
    const savedLogo = localStorage.getItem("app_logo");
    if(savedLogo){
        const logo = document.getElementById("appLogo");
        if(logo) logo.src = savedLogo;
    }
});
</script>
</script>

</body>
</html>
