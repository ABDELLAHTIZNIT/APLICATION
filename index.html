<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *{box-sizing:border-box;}

    body{
      margin:0;
      background:#111827;
      font-family:Arial, sans-serif;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#fff;
    }

    .lang{
      position:fixed;
      top:10px;
      right:10px;
      background:#1e293b;
      padding:6px 9px;
      border-radius:6px;
      font-size:13px;
      cursor:pointer;
      z-index:10;
      user-select:none;
    }

    .container{
      width:100%;
      max-width:320px;
      text-align:center;
      padding:20px;
    }

    .logo-app{
      width:120px;
      margin:0 auto 28px;
    }

    .logo-app img{
      width:100%;
      height:auto;
      object-fit:contain;
      display:block;
    }

    .input-group{
      position:relative;
      margin:15px 0;
    }

    input[type="text"],
    input[type="password"]{
      width:100%;
      padding:13px 44px;
      border:none;
      border-radius:10px;
      background:#1f2937;
      color:#fff;
      font-size:15px;
    }

    input::placeholder{
      color:#9ca3af;
    }

    input:focus{
      outline:2px solid #22c55e;
    }

    .input-icon{
      position:absolute;
      left:12px;
      top:50%;
      transform:translateY(-50%);
      color:#9ca3af;
      font-size:17px;
    }

    .toggle-pass{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      color:#9ca3af;
      font-size:17px;
      cursor:pointer;
    }

    .remember{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      margin:15px 0 22px;
      font-size:14px;
      color:#cbd5e1;
    }

    button{
      width:70%;
      margin:0 auto;
      display:block;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      font-weight:bold;
      font-size:16px;
      color:#000;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:#16a34a;
    }

    .msg{
      font-size:13px;
      margin-top:12px;
      min-height:18px;
    }
  </style>
</head>
<body>

  <div class="lang" id="langBtn" onclick="switchLang()">FR</div>

  <div class="container">
    <div class="logo-app">
      <img id="appLogo" src="" alt="Logo">
    </div>

    <form onsubmit="return login(event)">
      <div class="input-group">
        <i class="fas fa-user input-icon"></i>
        <input type="text" id="username" placeholder="Nom d'utilisateur" required>
      </div>

      <div class="input-group">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="password" placeholder="Mot de passe" required>
        <i id="eyeIcon" class="fas fa-eye toggle-pass" onclick="togglePassword()"></i>
      </div>

      <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember" id="rememberLabel">Remember me</label>
      </div>

      <button type="submit" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Connexion
      </button>

      <div class="msg" id="msg"></div>
    </form>
  </div>

  <script>
    function login(e){
      e.preventDefault();

      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const msg = document.getElementById("msg");
      const remember = document.getElementById("remember");

      const u = usernameInput.value.trim();
      const p = passwordInput.value.trim();

      if(u === "admin" && p === "123456"){
        msg.style.color = "lightgreen";
        msg.innerText = currentLang === "EN" ? "Login successful!" : "Connexion réussie !";

        if(remember.checked){
          localStorage.setItem("saved_username", u);
        }else{
          localStorage.removeItem("saved_username");
        }

        localStorage.setItem("logged_user", u);

        setTimeout(() => {
          location.href = "dashboard.html";
        }, 700);
      }else{
        msg.style.color = "#ef4444";
        msg.innerText = currentLang === "EN"
          ? "Incorrect username or password"
          : "Nom d'utilisateur ou mot de passe incorrect";
      }

      return false;
    }

    function togglePassword(){
      const passwordInput = document.getElementById("password");
      const eyeIcon = document.getElementById("eyeIcon");

      if(passwordInput.type === "password"){
        passwordInput.type = "text";
        eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
      }else{
        passwordInput.type = "password";
        eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
      }
    }

    let currentLang = "FR";

    function switchLang(){
      const langBtn = document.getElementById("langBtn");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const rememberLabel = document.getElementById("rememberLabel");
      const msg = document.getElementById("msg");

      currentLang = currentLang === "FR" ? "EN" : "FR";
      langBtn.innerText = currentLang;

      if(currentLang === "EN"){
        usernameInput.placeholder = "Username";
        passwordInput.placeholder = "Password";
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
        rememberLabel.innerText = "Remember me";
        msg.innerText = "";
      }else{
        usernameInput.placeholder = "Nom d'utilisateur";
        passwordInput.placeholder = "Mot de passe";
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Connexion';
        rememberLabel.innerText = "Se souvenir de moi";
        msg.innerText = "";
      }
    }

    window.addEventListener("load", () => {
      const logo = localStorage.getItem("app_logo");
      const appLogo = document.getElementById("appLogo");
      const savedUsername = localStorage.getItem("saved_username");

      if(logo){
        appLogo.src = logo;
      }

      if(savedUsername){
        document.getElementById("username").value = savedUsername;
        document.getElementById("remember").checked = true;
      }
    });
  </script>

</body>
</html>
