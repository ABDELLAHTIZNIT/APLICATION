<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Points</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}

body{
    margin:0;
    background:#f3f4f6;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:12px;
    padding:20px;
    box-shadow:0 4px 20px rgba(0,0,0,.1);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header h2{
    margin:0;
    color:#065f46;
}

.add-btn{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#22c55e;
    color:#fff;
    border:none;
    font-size:20px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

th{
    background:#ecfdf5;
}

.action i{
    cursor:pointer;
    margin-right:10px;
    color:#065f46;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#fff;
    width:100%;
    max-width:420px;
    border-radius:12px;
    padding:20px;
}

.modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.modal-header h3{margin:0}

.modal-header i{
    cursor:pointer;
}

input,select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.btn-ok{
    background:#22c55e;
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}

.btn-cancel{
    background:#ef4444;
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>Points</h2>
        <button class="add-btn" onclick="openModal()">+</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nom Point</th>
                <th>Vanne</th>
                <th>Parcelle</th>
                <th>Parcelle physique</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="pointsTable"></tbody>
    </table>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">

        <div class="modal-header">
            <h3>Ajouter un point</h3>
            <i class="fas fa-times" onclick="closeModal()"></i>
        </div>

        <input type="text" id="pointName" placeholder="Nom du point (ex: P1)">

        <select id="vanne">
            <option value="">-- Choisir une vanne --</option>
            <option>Vanne 1</option>
            <option>Vanne 2</option>
        </select>

        <!-- ✅ مفتوحين للاختيار -->
        <select id="parcelle">
            <option value="">-- Choisir parcelle --</option>
            <option>Parcelle A</option>
            <option>Parcelle B</option>
        </select>

        <select id="parcellePhysique">
            <option value="">-- Choisir parcelle physique --</option>
            <option>PP 1</option>
            <option>PP 2</option>
        </select>

        <div class="modal-actions">
            <button class="btn-ok" onclick="savePoint()">✓</button>
            <button class="btn-cancel" onclick="closeModal()">✕</button>
        </div>

    </div>
</div>

<script>
function openModal(){
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

function savePoint(){
    const name = pointName.value;
    const vanne = vanne.value;
    const parcelle = document.getElementById("parcelle").value;
    const parcellePhysique = document.getElementById("parcellePhysique").value;

    if(!name || !vanne) return alert("Remplir au moins Nom et Vanne");

    const tr = document.createElement("tr");
    tr.innerHTML = `
        <td>${name}</td>
        <td>${vanne}</td>
        <td>${parcelle || "-"}</td>
        <td>${parcellePhysique || "-"}</td>
        <td class="action">
            <i class="fas fa-pen"></i>
            <i class="fas fa-trash"></i>
        </td>
    `;

    document.getElementById("pointsTable").appendChild(tr);
    closeModal();
}
</script>

</body>
</html>
