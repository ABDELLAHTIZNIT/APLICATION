<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paramètres des structures</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    margin:0;
    background:#f3f4f6;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:14px;
    padding:18px;
    box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.header{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:#004a62;
    margin-bottom:18px;
}

/* LIST */
.structure-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.structure-item{
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 14px;
    border-radius:10px;
    background:#f9fafb;
    cursor:pointer;
    transition:0.2s;
    border:1px solid #e5e7eb;
}

.structure-item:hover{
    background:#eef6fb;
}

.structure-item i{
    font-size:18px;
    color:#0ea5e9;
    width:26px;
    text-align:center;
}

.structure-item span{
    font-size:15px;
    color:#111827;
    font-weight:500;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">Paramètres des structures</div>

    <div class="structure-list">

        <div class="structure-item" onclick="openPage('societe.html')">
            <i class="fas fa-building"></i>
            <span>Société</span>
        </div>

        <div class="structure-item" onclick="openPage('ferme.html')">
            <i class="fas fa-tractor"></i>
            <span>Ferme</span>
        </div>

        <div class="structure-item" onclick="openPage('station.html')">
            <i class="fas fa-warehouse"></i>
            <span>Station</span>
        </div>

        <div class="structure-item" onclick="openPage('secteur.html')">
            <i class="fas fa-layer-group"></i>
            <span>Secteur</span>
        </div>

        <div class="structure-item" onclick="openPage('parcelle.html')">
            <i class="fas fa-seedling"></i>
            <span>Parcelle</span>
        </div>

        <div class="structure-item" onclick="openPage('parcelle_physique.html')">
            <i class="fas fa-border-all"></i>
            <span>Parcelle physique</span>
        </div>

        <div class="structure-item" onclick="openPage('vanne.html')">
            <i class="fas fa-faucet"></i>
            <span>Vanne</span>
        </div>

        <div class="structure-item" onclick="openPage('point.html')">
            <i class="fas fa-map-location-dot"></i>
            <span>Point</span>
        </div>

        <div class="structure-item" onclick="openPage('securite.html')">
            <i class="fas fa-shield-halved"></i>
            <span>Sécurité accès</span>
        </div>

    </div>

</div>

<script>
function openPage(page){
    window.location.href = page;
}
</script>

</body>
</html>
