<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>اسم الصفحة</title>

  <!-- CSS الموحد -->
  <link rel="stylesheet" href="theme.css">

  <!-- أيقونات -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

  <div class="title">Changer le mot de passe Admin</div>

  <div class="input-group">
    <input type="password" id="oldPass" placeholder="Mot de passe actuel">
    <i class="fas fa-eye icon-eye" onclick="togglePass('oldPass', this)"></i>
  </div>

  <div class="input-group">
    <input type="password" id="newPass" placeholder="Nouveau mot de passe">
    <i class="fas fa-eye icon-eye" onclick="togglePass('newPass', this)"></i>
  </div>

  <div class="input-group">
    <input type="password" id="confirmPass" placeholder="Confirmer le mot de passe">
    <i class="fas fa-eye icon-eye" onclick="togglePass('confirmPass', this)"></i>
  </div>

  <button class="btn" onclick="changePass()">Validé</button>

</div>

<script>
function togglePass(id, icon){
  let input = document.getElementById(id);
  if(input.type === "password"){
    input.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}

function changePass(){
  let oldP = document.getElementById("oldPass").value;
  let newP = document.getElementById("newPass").value;
  let confP = document.getElementById("confirmPass").value;

  if(newP !== confP){
    alert("⚠️ Les mots de passe ne correspondent pas !");
    return;
  }

  alert("Mot de passe modifié avec succès !");
}
</script>

</body>
</html>
