<div class="container">

  <div class="section-card">
    <div class="section-header" onclick="toggleSection(this)">
      <span><i class="fas fa-shield-alt"></i> Sécurité / Accès</span>
      <i class="fas fa-chevron-down arrow"></i>
    </div>

    <div class="section-content">

      <div class="small-title">Sélectionner utilisateur</div>
      <select id="userSelect">
        <option>Ahmed</option>
        <option>Mohamed</option>
        <option>User Test</option>
      </select>

      <div class="small-title">Profil</div>
      <select id="roleSelect">
        <option>Administrateur</option>
        <option>Contrôle</option>
        <option>Lecture seulement</option>
        <option>Accès limité</option>
      </select>

      <div class="small-title">Permissions</div>

      <label class="perm-row">
        <input type="checkbox">
        <span>Accès aux paramètres</span>
      </label>

      <label class="perm-row">
        <input type="checkbox">
        <span>Ajouter irrigation</span>
      </label>

      <label class="perm-row">
        <input type="checkbox">
        <span>Modifier irrigation</span>
      </label>

      <label class="perm-row">
        <input type="checkbox">
        <span>Supprimer irrigation</span>
      </label>

      <label class="perm-row">
        <input type="checkbox">
        <span>Accès Suivi Eau</span>
      </label>

      <label class="perm-row">
        <input type="checkbox">
        <span>Accès Balance</span>
      </label>

      <label class="perm-row">
        <input type="checkbox">
        <span>Accès Paramètres structures</span>
      </label>

      <button class="btn-save">Enregistrer</button>
    </div>
  </div>

</div>

<style>
*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  margin:0;
  padding:20px;
  background:#eaeaea;
}

.container{
  max-width:900px;
  margin:auto;
}

.section-card{
  background:#fff;
  border-radius:16px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
  overflow:hidden;
}

.section-header{
  background:#008ecc;
  color:#fff;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

.section-header span{
  display:flex;
  align-items:center;
  gap:10px;
}

.section-header .arrow{
  transition:transform .25s ease;
}

.section-card.open .section-header .arrow{
  transform:rotate(180deg);
}

.section-content{
  padding:18px 16px;
  display:block;
}

.section-card.closed .section-content{
  display:none;
}

.small-title{
  color:#004a62;
  font-size:15px;
  font-weight:bold;
  margin:14px 0 8px;
}

select{
  width:100%;
  padding:11px 12px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  font-size:14px;
  background:#fff;
  margin-bottom:4px;
  outline:none;
}

select:focus{
  border-color:#008ecc;
}

.perm-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  font-size:15px;
  padding:10px 12px;
  background:#f9f9f9;
  border:1px solid #e5e7eb;
  border-radius:10px;
  cursor:pointer;
}

.perm-row input[type="checkbox"]{
  width:18px;
  height:18px;
  accent-color:#22c55e;
  cursor:pointer;
}

.btn-save{
  margin-top:14px;
  background:#22c55e;
  border:none;
  color:#fff;
  padding:12px 16px;
  border-radius:10px;
  cursor:pointer;
  width:100%;
  font-size:15px;
  font-weight:bold;
  transition:.2s;
}

.btn-save:hover{
  background:#16a34a;
}

@media (max-width:600px){
  body{
    padding:14px;
  }

  .section-header{
    font-size:15px;
    padding:13px 14px;
  }

  .section-content{
    padding:14px;
  }

  .perm-row{
    font-size:14px;
    padding:9px 10px;
  }
}
</style>

<script>
function toggleSection(header){
  const card = header.parentElement;
  card.classList.toggle("closed");
  card.classList.toggle("open");
}

document.querySelectorAll(".section-card").forEach(card=>{
  card.classList.add("open");
});
</script>
