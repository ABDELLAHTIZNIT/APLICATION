<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secteurs</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}

body{
  margin:0;
  background:#f3f4f6;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
  background:#fff;
  border-radius:14px;
  padding:20px;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.header h2{margin:0;color:#004a62}

.add-btn{
  background:#22c55e;
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:8px;
  font-size:18px;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  text-align:center;
}

th{
  background:#008ecc;
  color:#fff;
}

tr:nth-child(even){
  background:#f9fafb;
}

.action-btn{
  cursor:pointer;
  margin:0 6px;
  font-size:16px;
}

.delete{color:#ef4444}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  width:90%;
  max-width:400px;
  border-radius:12px;
  padding:16px;
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.modal-header i{cursor:pointer}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #d1d5db;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
}
.btn-save{
  background:#22c55e;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
}
.btn-cancel{
  background:#ef4444;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>Secteurs</h2>
    <button class="add-btn" onclick="openModal()">+</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Nom Secteur</th>
        <th>Station</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="secteurTable"></tbody>
  </table>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Ajouter un secteur</h3>
      <i class="fas fa-times" onclick="closeModal()"></i>
    </div>

    <input type="text" id="secteurName" placeholder="Nom du secteur">

    <select id="secteurStation">
      <option value="">-- Choisir une station --</option>
    </select>

    <div class="modal-actions">
      <button class="btn-save" onclick="saveSecteur()">✓</button>
      <button class="btn-cancel" onclick="closeModal()">✕</button>
    </div>
  </div>
</div>

<script>
let secteurs = JSON.parse(localStorage.getItem("secteurs")) || [];
let stations = JSON.parse(localStorage.getItem("stations")) || [];

/* Charger stations */
function loadStations(){
  const select = document.getElementById("secteurStation");
  select.innerHTML = '<option value="">-- Choisir une station --</option>';

  stations.forEach(s=>{
    const opt = document.createElement("option");
    opt.value = s.nom;
    opt.textContent = s.nom;
    select.appendChild(opt);
  });
}

/* Afficher tableau */
function renderSecteurs(){
  const tbody = document.getElementById("secteurTable");
  tbody.innerHTML = "";

  secteurs.forEach((s,i)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${s.nom}</td>
      <td>${s.station}</td>
      <td>
        <i class="fas fa-trash action-btn delete" onclick="deleteSecteur(${i})"></i>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function openModal(){
  loadStations();
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  secteurName.value="";
  secteurStation.value="";
}

function saveSecteur(){
  const nom = secteurName.value.trim();
  const station = secteurStation.value;

  if(!nom || !station){
    alert("Remplir tous les champs");
    return;
  }

  secteurs.push({ nom, station });
  localStorage.setItem("secteurs", JSON.stringify(secteurs));
  closeModal();
  renderSecteurs();
}

function deleteSecteur(i){
  if(confirm("Supprimer ce secteur ?")){
    secteurs.splice(i,1);
    localStorage.setItem("secteurs", JSON.stringify(secteurs));
    renderSecteurs();
  }
}

renderSecteurs();
</script>

</body>
</html>
